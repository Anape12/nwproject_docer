volumes:
  mysql-data:

services:
  tomcat:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.tomcat
    container_name: my-tomcat
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - app-network
    environment: # ← ★これ追加
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
  app:
    container_name: javadev
    build:
      context: .
      dockerfile: Dockerfile

    environment: # ← ✔ appの中に入れる
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    volumes:
      - .:/workspaces:cached

    command: sleep infinity

    depends_on:
      db:
        condition: service_healthy

    networks:
      - app-network

  db:
    container_name: mysqldb
    image: mysql:8.0
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nwproject_db

    ports:
      - "3306:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - app-network

networks:
  app-network:
    driver: bridge
